name: Deploy to GitHub Pages

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: read
    pages: write
    id-token: write

concurrency:
    group: pages
    cancel-in-progress: false

jobs:
    build:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - uses: actions/setup-node@v4
              with:
                  node-version: 22
                  cache: npm

            # Using `npm install` instead of `npm ci` because the lockfile is
            # generated on Windows and lacks resolved entries for Linux-only
            # optional deps like @rollup/rollup-linux-x64-gnu. `npm ci` would
            # skip them, causing the build to fail. See npm/cli#4828.
            - run: npm install
            - run: npm run build:site
              env:
                  BASE_URL: /${{ github.event.repository.name }}/
            - run: npm run build:docs
              env:
                  BASE_URL: /${{ github.event.repository.name }}/

            - uses: actions/upload-pages-artifact@v3
              with:
                  path: dist

    deploy:
        needs: build
        runs-on: ubuntu-latest
        environment:
            name: github-pages
            url: ${{ steps.deployment.outputs.page_url }}
        steps:
            - id: deployment
              uses: actions/deploy-pages@v4

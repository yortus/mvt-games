<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>MVT Demos</title>
        <link rel="stylesheet" href="/site/nav.css" />
        <style>
            * { margin: 0; padding: 0; box-sizing: border-box; }
            html, body {
                width: 100%; height: 100%;
                background: #0d1117;
                color: #c9d1d9;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
            }

            /* ---- Gallery ---- */
            .gallery {
                max-width: 960px;
                margin: 0 auto;
                padding: calc(var(--site-nav-height, 48px) + 48px) 24px 48px;
            }
            .gallery h1 {
                font-size: 36px;
                font-weight: 700;
                color: #e6edf3;
                margin-bottom: 8px;
                text-align: center;
            }
            .gallery .subtitle {
                font-size: 16px;
                color: #8b949e;
                text-align: center;
                margin-bottom: 36px;
                line-height: 1.5;
            }
            .gallery-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
                gap: 20px;
            }
            .demo-card {
                background: #161b22;
                border: 1px solid #30363d;
                border-radius: 12px;
                overflow: hidden;
                transition: border-color 0.2s, transform 0.2s;
            }
            .demo-card:hover {
                border-color: #58a6ff;
                transform: translateY(-2px);
            }
            .demo-card-thumb {
                width: 100%;
                aspect-ratio: 3 / 2;
                object-fit: cover;
                background: #0d1117;
                display: block;
            }
            .demo-card-body {
                padding: 16px;
            }
            .demo-card-title {
                font-size: 16px;
                font-weight: 600;
                color: #e6edf3;
                margin-bottom: 12px;
            }
            .demo-card-actions {
                display: flex;
                gap: 8px;
            }
            .demo-card-actions button {
                padding: 6px 16px;
                border-radius: 6px;
                border: 1px solid #30363d;
                background: #21262d;
                color: #c9d1d9;
                font-size: 13px;
                cursor: pointer;
                transition: background 0.15s, border-color 0.15s;
            }
            .demo-card-actions button:hover {
                background: #30363d;
                border-color: #58a6ff;
            }
            .demo-card-actions .btn-run {
                background: #238636;
                border-color: #2ea043;
                color: #fff;
                font-weight: 600;
            }
            .demo-card-actions .btn-run:hover {
                background: #2ea043;
            }

            /* ---- Demo runner ---- */
            #demo-runner {
                display: none;
                position: fixed;
                inset: 0;
                top: var(--site-nav-height, 48px);
                background: #000;
                justify-content: center;
                align-items: center;
                flex-direction: column;
            }
            #demo-runner.active {
                display: flex;
            }
            #demo-runner canvas {
                border: 1px solid #30363d;
                border-radius: 6px;
                max-width: calc(100vw - 24px);
                max-height: calc(100vh - var(--site-nav-height, 48px) - 24px);
                object-fit: contain;
                width: auto;
                height: auto;
            }
            .back-button {
                position: absolute;
                top: 12px;
                left: 12px;
                z-index: 10;
                width: 36px;
                height: 36px;
                border-radius: 6px;
                border: 1px solid #555;
                background: rgba(0, 0, 0, 0.6);
                color: #ccc;
                font-size: 18px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s;
                line-height: 1;
            }
            .back-button:hover {
                background: rgba(255, 255, 255, 0.15);
            }

            /* ---- Info modal ---- */
            #info-modal {
                display: none;
                position: fixed;
                inset: 0;
                z-index: 10000;
                background: rgba(0, 0, 0, 0.7);
                justify-content: center;
                align-items: center;
                padding: 24px;
            }
            #info-modal.active {
                display: flex;
            }
            .info-panel {
                background: #161b22;
                border: 1px solid #30363d;
                border-radius: 12px;
                max-width: 520px;
                width: 100%;
                padding: 28px;
                position: relative;
                max-height: 80vh;
                overflow-y: auto;
            }
            .info-panel h2 {
                font-size: 22px;
                font-weight: 700;
                color: #e6edf3;
                margin-bottom: 12px;
                padding-right: 32px;
            }
            .info-panel p {
                font-size: 14px;
                color: #c9d1d9;
                line-height: 1.6;
                margin-bottom: 16px;
            }
            .info-panel h3 {
                font-size: 13px;
                font-weight: 600;
                color: #8b949e;
                text-transform: uppercase;
                letter-spacing: 0.5px;
                margin-bottom: 8px;
            }
            .info-panel ul {
                list-style: none;
                padding: 0;
                margin: 0 0 20px;
                display: flex;
                flex-wrap: wrap;
                gap: 6px;
            }
            .info-panel ul li {
                font-size: 13px;
                padding: 4px 10px;
                background: #0d1117;
                border: 1px solid #30363d;
                border-radius: 20px;
                color: #c9d1d9;
            }
            .info-panel .source-link {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 8px 16px;
                background: #21262d;
                border: 1px solid #30363d;
                border-radius: 6px;
                color: #58a6ff;
                text-decoration: none;
                font-size: 13px;
                transition: background 0.15s, border-color 0.15s;
            }
            .info-panel .source-link:hover {
                background: #30363d;
                border-color: #58a6ff;
            }
            .info-close {
                position: absolute;
                top: 16px;
                right: 16px;
                width: 28px;
                height: 28px;
                border-radius: 6px;
                border: none;
                background: transparent;
                color: #8b949e;
                font-size: 18px;
                cursor: pointer;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: background 0.15s, color 0.15s;
            }
            .info-close:hover {
                background: rgba(255, 255, 255, 0.1);
                color: #e6edf3;
            }
        </style>
    </head>
    <body>
        <nav class="site-nav">
            <button class="site-nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <svg viewBox="0 0 20 20"><path d="M2 4.5h16M2 10h16M2 15.5h16" stroke="currentColor" stroke-width="2" stroke-linecap="round" fill="none"/></svg>
            </button>
            <a class="site-nav-brand" href="../">MVT Games</a>
            <ul class="site-nav-links">
                <li><a href="../games/">Games</a></li>
                <li><a class="active" href="./">Demos</a></li>
                <li><a href="../docs/">Docs</a></li>
                <li><a href="../playground/">Playground</a></li>
            </ul>
            <div class="site-nav-spacer"></div>
            <a class="site-nav-github" href="https://github.com/yortus/mvt-games" target="_blank" rel="noopener" title="GitHub repository">
                <svg viewBox="0 0 16 16"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/></svg>
            </a>
        </nav>
        <script>document.querySelector('.site-nav-toggle')?.addEventListener('click',function(){var n=this.closest('.site-nav');n.classList.toggle('site-nav--open');this.setAttribute('aria-expanded',n.classList.contains('site-nav--open'))});</script>

        <div class="gallery" id="gallery">
            <h1>MVT Demos</h1>
            <p class="subtitle">
                Interactive demonstrations of techniques and patterns
                used in the MVT architecture.
            </p>
            <div class="gallery-grid" id="gallery-grid"></div>
        </div>

        <div id="demo-runner"></div>

        <div id="info-modal">
            <div class="info-panel" id="info-panel">
                <button class="info-close" id="info-close" aria-label="Close">&times;</button>
                <h2 id="info-name"></h2>
                <p id="info-desc"></p>
                <h3>Techniques</h3>
                <ul id="info-techniques"></ul>
                <div id="info-source-container"></div>
            </div>
        </div>

        <script type="module" src="/src/demos/main.ts"></script>
    </body>
</html>
